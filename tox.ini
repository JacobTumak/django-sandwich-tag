# Tox Configuration
[tox]
min_version = 4.0.0
env_list =
    py310
    py311
    py312
    py313
    py314
    coverage
    format
    lint
labels =
    test = py310, py311, py312, py313, py314
    static = format, lint


[testenv]
description = Run tests with pytest.
package = wheel
wheel_build_env = .pkg
deps = [test]
allowlist_externals = pytest
commands =
    pytest {posargs}


[testenv:coverage]
description = Generate test coverage report with pytest-cov.
base_python = py310
commands =
    pytest --cov=sandwich_tag {posargs}


[testenv:format]
description = Check source code style with black and isort.
base_python = py310
skip_install = true
deps = [format]
commands =
    black --check --diff sandwich_tag tasks tests {posargs}
    isort --check --diff sandwich_tag tasks tests {posargs}


[testenv:lint]
description = Lint source code with flake8.
base_python = py310
skip_install = true
deps = [lint]
commands =
    flake8 ./sandwich_tag {posargs}


[testenv:dev]
description = Create a ready-to-code development environment
basepython = py312
package = editable
deps = [utils,build,test,format,lint]

[gh-actions]
python:
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

# Other Configuration
[pytest]
DJANGO_SETTINGS_MODULE = tests.settings
# -- recommended but optional:
python_files = tests.py test_*.py *_tests.py


[flake8]
# Flake8 Error Code References:
# F###, E999, C90#: https://flake8.pycqa.org/en/latest/user/error-codes.html
# E###, W###: https://pycodestyle.pycqa.org/en/latest/intro.html#error-codes
# B950: leave max line length to black
# W503 : line break before binary operator - conflicts with black
select = C,E,F,W,B,B950
extend-ignore = E203,E501,E731,B950,W503
extend-exclude = docs,dist,venv,scrapheap,devenv,tox
max-line-length = 119
max-complexity = 10
